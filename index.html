<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Index</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 300px;
    }

    h2 {
      margin-bottom: 20px;
    }

    a {
      display: block;
      margin: 10px 0;
      padding: 12px;
      text-decoration: none;
      background: #007bff;
      color: white;
      border-radius: 6px;
      transition: 0.2s;
    }

    a:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Select Page</h2>

    <a href="passwordrest.html">Password Reset</a>
    <a href="PaymentFailed.html">Payment Failed</a>

  </div>

</body>
</html>
